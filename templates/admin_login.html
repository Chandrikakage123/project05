<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<style>
    body {
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
    }

    form {
        background: white;
        padding: 50px 60px;
        border-radius: 15px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        text-align: center;
    }

    h2 {
        position: absolute;
        top: 80px;
        color: white;
        font-size: 28px;
        letter-spacing: 1px;
    }

    input[type="text"],
    input[type="password"] {
        width: 250px;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        outline: none;
        transition: 0.3s;
    }

    input:focus {
        border-color: #667eea;
        box-shadow: 0 0 8px rgba(102,126,234,0.5);
    }

    button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: linear-gradient(to right, #36d1dc, #5b86e5);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: linear-gradient(to right, #5b86e5, #36d1dc);
        transform: translateY(-2px);
        box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

</style>

</head>
<body>

<h2>🔐 Admin Login</h2>

<form method="POST">
<input type="text" name="username" placeholder="Username" required><br><br>
<input type="password" name="password" placeholder="Password" required><br><br>
<button type="submit">Login</button>
</form>

</body>
</html>
